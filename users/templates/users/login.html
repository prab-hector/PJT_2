<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    {% load crispy_forms_tags %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm bg-white">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4 text-dark font-weight-bold">Log In</h2>
                        
                        <form method="POST">
                            {% csrf_token %}
                            
                            {{ form|crispy }}
                            
                            <div class="form-group mt-4">
                                <button class="btn btn-outline-info btn-block w-100" type="submit">Log In</button>
                            </div>
                        </form>
                        
                        <div class="border-top pt-3 mt-3 text-center">
                            <small class="text-muted">
                                Need an Account? <a class="ml-2 text-info text-decoration-none" href="{% url 'register' %}">Sign Up Now</a>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
